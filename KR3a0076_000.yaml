  - {type: page-break, offset: 0, content: '', id: KR3a0076_WYG_000-1a, image: WYG0709/WYG0709-0721a.png}
body:
  text: 內訓儒家類提要臣等謹案內訓一卷明仁孝文皇后撰案成祖以篡逆取國淫刑肆暴無善可稱后乃特以賢著是書凡二十篇曰德性曰修身曰慎言曰謹行曰勤勵曰警戒曰節儉曰積善曰遷善曰崇聖訓曰景賢範曰事父母曰事君曰事舅姑曰奉祭祀曰母儀曰睦親曰慈幼曰逮下曰待外戚前有永樂三年正月望日自序內有肅事今皇上三十餘年之語考明史后妃傳后以洪武九年册為燕王妃至永樂三年正月甫及三十年云三十餘年蓋約略大數耳又考本傳載后撰此書頒行天下在永樂三年而明朝典彚載五年十一月以仁孝皇后內訓頒羣臣俾教於家若五年以前已頒行天下不應至五年之末始賜羣臣又考名山藏坤則記載后初為此書不過示皇太子諸王而已至永樂五年七月以後成祖乃出后內訓勸善二書頒賜臣民與典彚相合此本為明初刋板首標大明仁孝皇后於永樂五年七月乙卯崩甲午諡曰仁孝則此本刋于五年七月以後無疑至十一月特賜臣民正屬刋行之始明史本傳偶未及檢耳各章之下繫以小注往往頒揚原文當為儒臣所加明史藝文志及明朝典彚俱不著其名皆為疏漏又藝文志載內訓一卷髙皇后撰勸善書一卷文皇后撰不知二書之出於一人亦偶誤也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀內訓原序吾幼承父母之教誦詩書之典職謹女事蒙先人積善餘慶夙被妃庭之選事我孝慈髙皇后朝夕侍朝髙皇后教諸子婦禮法惟謹吾恭奉儀範曰聆教言祗敬佩服不敢有違肅事今皇上三十餘年一遵先志以行政教吾思備位中宫愧德弗似歉於率下無以佐皇上內治之美以忝髙皇后之訓常觀史傳求古賢婦貞女雖稱德性之懿亦未有不由於教而成者然古者教必有方男子八嵗而入小學女子十年而聽姆教小學之書無傳晦菴朱子爰編緝成書為小學之教者始有所入獨女教未有全書世惟取范曄後漢書曹大家女戒為訓恆病其略有所謂女憲女則皆徒有其名耳近世始有女教之書盛行大要撮曲禮內則之言與周南召南詩之小序及傳記而為之者仰惟我髙皇后教訓之言卓越往昔足以埀法萬世吾耳熟而心藏之乃於永樂二年冬用述髙皇后之教以廣之為內訓二十篇以教宫壼夫人之所以克聖者莫嚴於養其德性以修其身故首之以德性而次之以修身而修身莫切於謹言行故次之以愼言謹行推而至於勤勵警戒而又次之以節儉人之所以獲久長之慶者莫加於積善所以無過者莫加於遷善又次之以積善遷善之數者皆身之要而所以取法者則必守我髙皇后之教也故繼之以崇聖訓逺而取法於古故次之以景賢範上而至於事父母事君事舅姑奉祭祀又推而至於母儀睦親慈幼逮下而終之於待外戚顧以言辭淺陋不足以發揚深旨而其條目亦粗備矣觀者於此不必泥於言而但取於意其於治內之道或有禆於萬一云永樂三年正月望日序欽定四庫全書內訓明仁孝文皇后徐氏撰德性章第一貞靜幽間端莊誠一女子之德性也孝敬仁明慈和柔順德性備矣夫德性原於所稟而化成於習匪由外至實本於身貞靜者正固而不妄動也幽間者幽深間雅之謂端莊者齊肅正直之謂誠一者真實無妄之謂善事父母為孝主一無適為敬仁者心之德愛之理明謂聰明慈者無不愛和者無所乖柔順者坤之德也言是數者女子之德性也必全是數者而後德性備夫德性者天之所命而成於所稟無有不善而氣習變化始有善惡之異然非由外爍我者也實本於吾之身而已爍商入聲古之貞女理性情治心術崇道德故能配君子以成其教言古之貞女理其性情治其心術崇其道德以成教於內也是故仁以居之義以行之智以燭之信以守之禮以體之匪禮勿履匪義勿由動必由道言必由信匪言而言則厲階成焉匪禮而動則邪僻形焉閾以限言玉以節動禮以制心道以制欲養其德性所以飭身可不愼與閾音域此理性情治心術崇道德之事也燭照也體以身體之也履踐也勿者禁止之辭道則日用事物當行之理厲禍階梯也閾門限也言居仁由義智以照私言不失實身體乎禮以全五常之德非禮勿踐非義勿由舉動必循乎道發言必本於信非禮之言而言之則禍亂之階梯成焉非禮之事而踐之則已之邪僻見焉古者言不踰閾是閾以限言也行則鳴佩玉是玉以節動也禮以裁其心道以勝其欲如此則可以養其德性以修飭其身不可不謹以致丁寧告戒之意無損於性者乃可以養德無纍於德者乃可以成性積過由小害德為大故大厦傾頽基址弗固也巳身不飭德性有虧也七情之過皆足以損性惟存於中者淡然而無所汨則其德日新矣一事之微皆可以纍德惟在於己者至公而無私則其性渾然矣夫人之積過雖甚小而其害德則甚大猶大厦傾危其基址有不堅固身不修飭其德性有所虧損美璞無瑕可為至寶貞女純德可配京室檢身制度足為母儀勤儉不妬足法閨閫璞音朴瑕音遐璞未琢之玉也瑕玼也配匹也京室京師之室詩所謂京室之婦是也言美玉無有瑕玼則可以為至寶貞女秉純粹之德則可以為京室之匹能以法度檢束其身則可以表儀於下能勤儉而不妬忌則可以示法於中玼音慈若夫驕盈嫉忌肆意適情以病其德性斯亦無所取矣古語云處身造宅黼身建德詩云俾爾彌爾性純嘏爾常矣嘏音假驕矜盈滿害賢曰嫉憎惡曰忌四者女之醜德而又加之以恣肆其心意便適於情欲是則所以害其德性也何足取哉古語先民之言也黼繡斧於裳也建立也黼身建德猶楊雄所謂斧藻其德也詩大雅卷阿之篇彌終也性猶命也嘏福也引詩以言有是德性則可以常享福祿也修身章第二或曰太任目不視惡色耳不聽淫聲口不出傲言若是者修身之道乎曰然古之道也夫目視惡色則中眩焉耳聽淫聲則內禠焉口出傲言則驕心侈焉是皆身之害也眩音縣禠音池侈音恥或人問文王母太任之事為修身之道故然其言也蓋非特太任也古者婦人妊子寢不側坐不邉立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲夜則令瞽誦詩道正事如此則生子形容端正才過人矣淫聲非禮之聲傲言非禮之言眩者目無常主也禠奪也侈泰也夫淫聲惡色皆足以惑人有觸於外必動其中故必以是為戒夫言者心之發也矜慢在心故其發於言也傲言之傲則其驕心侈泰可知身之不修此為害矣蹕音必故婦人居必以正所以防慝也行必無陂所以成德也慝音忒陂音祕慝穢也邪也隱惡也陂傾也此承上文而言婦人所居必以正所以防禦邪慝行無傾邪所以成其德行者也是故五綵盛服不足以為身華貞順率道乃可以進婦德不修其身以爽厥德斯為邪矣諺有之曰治穢養苖無使莠驕剗荆剪棘無使塗塞是以修身所以成其德者也莠音酉剗音鏟華光華也率循也爽差也諺俗語也穢蕪也一曰田中雜草也一曰汙也莠害苖草也驕盛貌剗削也棘木叢生多刺塗路也以五綵繪繡而為衣服非不盛也以人視之則可以為光華此特飾其外者耳必也秉貞順之操以循乎道然後可以進婦德婦德進而後可以光華於身則修身之效著矣夫惟飾其外而於其內者有所差爽則不得其正矣故引諺語以明之以言乎必在於修身乃可以成其德也夫身不修則德不立德不立而能成化於家者蓋寡焉而况於天下乎天下之本在國國之本在家家之本在身身不修則己之德有所不立不能成教化於一家而况助君子以行教化於天下乎言必不能也是故婦人者從人者也夫婦之道剛柔之義也昔者明王之所以謹婚姻之始者重似續之道也家之隆替國之廢興於斯係焉於乎閨門之內修身之教其勗愼之哉替音涕勗音旭似嗣也續相連也隆豐大也替滅也勗勉也婦有三從之道在家從父適人從夫夫死從子故曰婦人從人者也剛柔者隂陽之義也天地合而後萬物興隂陽和而後雨澤降夫婦和而後家道成故曰剛柔之義也夫昏禮萬世之始上以事宗廟下以繼後世關於家國者匪輕故君子重之然則處於閨門之內者其可不加勉於修身之教哉愼言章第三婦教有四言居其一心應萬事匪言曷宣言而中節可以免悔發不當理禍必隨之諺曰誾誾謇謇匪石可轉訿訿譞譞烈火燎原又曰口如扃言有恆口如注言無據甚矣言之不可不愼也中去聲當去聲誾音銀謇肩上聲訿音紫譞音暄燎音料四教者古者婦人先嫁三月教以婦德婦言婦容婦功也曷何宣通悔恨也誾誾和悅而諍也謇謇直言貌訿訿謗毁也譞譞多言也烈火猛也燎放火也髙平曰原扃關也恆常也注灌也據依也此甚戒婦言之不可不謹也先去聲况婦人德性幽間言非所尚多言多失不如寡言故書斥牝雞之晨詩有厲階之刺禮嚴出梱之戒善於自持者必於此而加愼焉庶乎其可也斥音尺牝貧上聲刺音次相坤上聲寡少斥指斥也牝母梱門限也庶近也言婦人不尚多言多言則必致多失不如言之少也書牧誓曰牝雞之晨惟家之索詩瞻卬篇曰婦有長舌維厲之階禮記曲禮曰外言不入於梱內言不出於梱是皆多言之戒也婦人善持其身者茍能視此以為警焉則庶幾可以無多言之失也卭音仰然則愼之有道乎曰有學南宫縚可也縚音叨南宫縚孔子弟子南容也居南宫又名適字子容大雅抑之詩曰白圭之玷尚可磨也斯言之玷不可為也南容一日三復此言蓋深能謹於言也此承上文言愼言有道乎故曰有當學南容之謹言可也夫緘口內修重諾無尤寧其心定其志和其氣守之以仁厚持之以莊敬質之以信義一語一默從容中道以合乎坤靜之體則讒慝不作家道雍穆矣緘音監諾囊入聲讒音巉緘封諾應尤過也寧安也讒譛也言緘口以修其德於內雖一諾不敢以輕則可以無過夫心寧則言不躁志定則言不剽氣和則言不暴仁厚則言溫純莊敬則言恪重信義則言惇實一語默之間從容不迫吻合乎坤靜之體則讒邪之言無自而興則家道極其和矣剽飄去聲吻文上聲故女不矜色其行在德無鹽雖陋言用於齊而國安孔子曰有德者必有言有言者不必有德矜驕矜也無鹽齊之醜女以言諷宣王宣王用其言停漸臺罷女樂退諂諛去雕琢闢公門招直言延側陋立無鹽為后齊國大安事見新序此所謂女不矜色而所行惟在於德也故引孔子之言以美之以見和順積中英華發外則徒能言者未必有德也漸平聲謹行章第四甚哉婦人之行不可以不謹也自是者其行專自矜者其行危自欺者其行矯以汙行專則綱常廢行危則嫉戾興行矯以汙則人道絶有一於此鮮克終也甚哉者嗟歎之深也專專制也危隤也自欺云者知其行之當謹而不能謹也矯詐汙薉也綱謂三綱君為臣綱父為子綱夫為妻綱常謂五常仁義禮智信也嫉戾惡狠也人道絶則綱常蕩滅矣克能也是數者婦人之行所當謹者也然或有一於此則其能有終者少也故篇首深致嗟歎之辭其所以警發者至矣薉穢同隤頽同夫干霄之木本之深也凌雲之臺基之厚也婦有令譽行之純也本深在乎栽培基厚在乎積纍行純在乎自力不為純行則戚疏離焉長幼紊焉貴賤殽焉是故欲成其大當謹其微縱於毫末本大不伐昧於冥冥神鑒孔明百行一虧終纍全德紊音問霄雲霄也本根也凌越也令譽善稱也純不雜也培壅也基址也積纍者聚積而增纍之也力猶力穡之力用力勉強之義戚親也疏逺也紊亂也殽雜錯也大者德行是也微者一舉動之微也伐斬伐也昧晦冥冥幽暗也鑒照孔甚也虧缺也全德即純行也以木與臺之髙大必本於栽培積纍之所致以喻乎女子之行亦必在於真積力久而後純夫不能自立以喪其行則親疏之屬相去而不附長幼之序紊亂而無别貴賤之等殽雜而無紀欲成其大者則於甚細微之事尤當致謹然或忽於毫末之微而不加謹則終大而莫伐猶傳所謂毫末不扎將尋斧柯是也蓋冥冥之中有昭昭者存茍謂幽暗之處而無所見則神之鑒照甚明豈可忽哉然或百行之中有一虧焉則終有纍於全德也穡音色體柔順率貞潔服三從之訓謹內外之别勉之敬之終始惟一由是可以修家政可以和上下可以睦姻戚而動無不協矣易曰恆其德貞婦人吉此之謂也協音叶三從説見前篇協和也自體柔順至終始惟一此皆謹行之本也下極言其效故引易恆卦之言以結之夫以順從為恆者婦人之道在婦人則為貞故吉也勤勵章第五怠惰恣肆身之殃也勤勵不息身之德也是故農勤於耕士勤於學女勤於工農惰則五穀不穫士惰則學問不成女惰則機杼空乏恣資去聲殃音央勵音例穫黃入聲空去聲乏凡入聲怠懈倦也惰不敬也恣縱也肆放也殃禍也勤勤勞也勵勉力也不息無已也五穀禾麻粟麥豆也刈穀曰穫機杼織具也空窮乏匱也天下之事未有怠惰而能有成也此特舉士農而為言者所以切曉於人也以見婦人內助其君子其可頃刻而忘勤勵哉古者后妃親蠶躬以率下庶人之妻皆衣其夫效績有制愆則有辟夫治絲執麻以供衣服羃酒漿具菹醢以供祭祀女之職也不勤其事以廢其功何以辭辟衣去聲辟音僻羃音覔菹臻魚切醢音海祭統曰王后蠶於北郊以供純服蓋后妃親蠶其來尚矣躬以率下者以身先之也庶士衆士也衣服之也績功愆過也辟法也羃覆也漿酢也菹酢菜也醢肉醬也此引禮記國語之言互相發明以見女職之不可懈也茍為怠其事以廢其功則亦何以免於先王之法哉純音緇酢音昨又音措夫早作晚休可以無憂縷積不息可以成匹戒之哉毋荒寧荒寧者劌身之廉刃也雖不見其鋒隂為其所戕矣詩云婦無公事休其蠶織此怠惰之慝也縷音吕劌姑衛切戕音牆休息止也縷線也四丈為匹劌割也廉刃廉銛之刃也鋒兵專也戕者卒然而傷之也詩大雅瞻卭之篇公事朝廷之事蠶織婦人之業言夙興而夜息則用力勤而可以無怠惰之憂一縷而積久則可以成匹然則豈可不勤哉甚戒荒寧之不可也荒寧之戕身雖不可見其鋒刃然暗為其所傷矣故引詩言婦人本無公事豈可舍其職業而成怠惰之慝哉警戒之意深矣線線同銛音纎專端同暗暗同於乎貧賤不怠惰者易富貴不怠惰者難當勉其難毋忽其易於乎歎辭也人之處富貴則必安於驕逸其能不怠惰者鮮矣蓋貧賤而不怠惰則順而易富貴而不怠惰則逆而難然亦有處貧賤而慵惰者故又警之曰當勉其難毋忽其易警戒章第六婦人之德莫大乎端已端己之要莫重乎警戒居富貴也而恆懼乎驕盈居貧賤也而恆懼乎放失居安寧也而恆懼乎患難奉巵於手若將傾焉擇地而旋若將陷焉巵音支陷咸去聲端已正身也要約也警言之戒也放失肆縱也巵酒器旋周旋陷隤沒也人之平居鮮有無事而預為警戒者其心怠忽則百弊乘隙而生及心有所寤而欲戒焉徒然莫追矣故言婦人之德莫大乎端已端已之要莫重乎警戒也茍能常存乎敬畏奉巵於手若將傾覆焉擇地而旋若將墜陷焉兢兢業業推類而盡之不忘乎警戒則必無所失矣夫巵器之小者奉之則甚易宜無所傾覆而常若傾焉擇地而旋則舉動之間詳審周密宜無所隤陷而常若陷焉警戒之道至矣故一念之微獨處之際不可不愼謂無有見乎能隱於天乎謂無有知乎不欺於心乎一念之微人所不知也獨處之際人所不見也故易生怠忽不可不謹然人雖不知不見其能隱於天而欺於心乎天即理也不違於理無歉於心故可與言警戒矣歉苦簟切故肅然警惕恆存乎矩度湛然純一不干於匪僻舉動之際如對舅姑閨房之間如臨師保湛讒去聲惕他厯切肅敬也戒也惕憂懼也矩為方之器度法制也度有五分寸尺丈引也湛然澄徹也純一不雜不二也言心體之明而無所汨撓也干犯也僻邪也不干於非僻言不犯於非禮也舅姑夫之父母也尊親同於己之父母不敢不敬一舉動之際若對於舅姑則毋敢有忽也師女師保保其身體者也閨房至深密之處常若師保臨之在傍自不容於惰慢而益有所警畏矣汨音骨撓女巧切不惰於冥冥不矯於昭昭行之以誠持之以久隱顯不二由是德宜於家族行通於神明而百福咸臻矣隱暗處也顯明也宜者和順之意家一家族三族父族母族夫族也臻至也常人之情忽於幽暗而欲矯飾於白日隱顯一致非至誠無息者不能婦人能以誠自守仰不愧俯不怍則德非但宜於一家又宜於三族行通於神明而百順之福自然至矣怍音昨夫念慮有常動則無過思患預防所以逺禍不然一息不戒災害攸萃纍德終身悔何追矣預音譽攸所萃聚也警戒常存乎念慮是以動無過失未患而先思所以防之禍焉從生茍一息之頃而不戒則災害所萃終身有纍於德雖欲改悔無所及矣是故鑒古之失吾則得焉惕厲未形吾何尤焉詩曰相在爾室尚不愧於屋漏禮曰戒愼乎其所不覩恐懼乎其所不聞此之謂也覩都上聲厲危也形現也尤罪也鑒視古人之失而省己之失則吾身之德日修是吾之所得焉事雖未形而常兢惕若處危地則吾身何有於罪焉詩大雅抑之篇相視也尚庶幾也屋漏室西北隅也言獨居於室之時亦當庶幾不愧于屋漏然後可爾復引禮記中庸篇之言以結之言常存敬畏雖不見聞亦不敢忽所以示警戒之意深矣節儉章第七戒奢者必先於節儉也夫淡素養性奢靡伐德人率知之而取舍不決焉何也志不能帥氣理不足御情是以覆敗者多矣節撙節也易所謂節以制度是也儉約也淡素淡泊而質素也奢靡奢麗也伐敗也率皆也決斷也志者氣之將帥理者情之羈勒言人皆知儉素可以養性奢侈足以敗德而不能決斷於取舍之間由其志無所守而私勝於公所以顛覆敗亡者多矣撙尊上聲傳曰儉者聖人之寶也又曰儉德之共也侈惡之大也若夫一縷之帛出工女之勤一粒之食出農夫之勞致之非易而用之不節暴殄天物無所顧惜上率下承靡然一軌孰勝其敝哉殄田上聲軌音詭勝平聲傳謂古書子華子曰夫儉聖人之寶也所以御世之具也言聖人不寶金玉而寶節儉也春秋莊公二十四年春刻桓公桷御孫諌曰臣聞之儉德之共也侈惡之大也共恭也一説共也謂與天下共行此德也侈奢侈也暴疾也殄絶也率行也承奉也靡隨順也軌車轍也勝堪也敝敗壞也言天下之物皆出於農夫工女之勤勞用之無節暴殄天物奢侈相承上行下效隨順一律則亦何以勝其敝哉夫錦繡華麗不如布帛之溫也竒羞美味不若糲粢之飽也且五色壞目五味昏智飲清茹淡祛疾延齡得失損益判然懸絶矣糲音辣粢音資茹如去聲祛去平聲齡音零羞膳之美者也脫粟曰糲糲粢黍稷之粗者也五色亂目則目不明五味亂口則智益昏茹食也祛却之也齡年也甚言淡薄之有益於人也判然斷然也懸絶謂相去遼逺也古之賢妃哲后深戒乎此故絺綌無斁見美於周詩大練粗疏垂光於漢史敦廉儉之風絶侈麗之費天下從化是以海內殷富閭閻足給焉絺音笞綌音隙斁音亦絺綌葛布也精曰絺粗曰綌斁厭也周南葛覃之詩曰為絺為綌服之無斁言文王后妃躬治葛為布而服之無有厭斁也大練粗繒也後漢明德皇后常衣大練裙不加緣朔望諸姬主朝請望見后袍疏粗反以為綺縠就視乃笑后曰此繒特宜染色故用之耳六宫莫不歎息是以節儉之化行而四海之內富盛閭里之間豐足繒慈陵切緣去聲縠音斛蓋上以導下內以表外故后必敦節儉以率六宫諸侯之夫人以至士庶人之妻皆敦節儉以率其家然後民無凍餒禮義可興風化可紀矣餒弩罪切導猶引導謂先之也表猶明也敦厚也率先也餒飢也紀理也極也言上下之間各敦乎節儉則治化之效必臻其極矣或有問者曰節儉有禮乎曰禮與其奢也寧儉然有可約者焉有可腆者焉是故處已不可不儉事親不可不豐腆他典切約儉也腆厚也此引孔子之言以答或人之問又恐其一於儉而無等差故終之曰處已宜儉事親必豐積善章第八吉凶災祥匪由天作善惡之應各以其類善德攸積天降隂隲昔者成周之先世纍忠厚暨於文武伐暴救民又有聖母賢妃善德內助故上天隂隲福慶悠長隲音質隲定也暨及也言為善而獲吉祥為惡而召凶災匪天之降是於人也而實各以類應人惟行善而所積既久則天命降鑒隂定於上周自后稷始封於邰十世而至太王十二世而文王始受天命十三世至武王伐紂救民遂為天子聖母賢妃蓋指太任太姒邑薑也聖賢之君繼作而又有聖母賢妃以善德而助於內故上天隂隲使周家福慶悠久而綿逺也我國家世積厚德天命攸集我太祖髙皇帝順天應人除殘削暴救民水火孝慈髙皇后好生大德助勤於內故上天隂隲奄有天下生民用乂天之隂隲不爽於德昭若明鑒夫享福祿之報者由積善之慶婦人內助於國家豈可以不積善哉奄大也乂安也言天之所以隂隲於上者由人之德之所感召故無所差爽天之鑒照甚明而享福祿之慶者皆由於積善之所致也此序國家受命隆興與成周同一積善之慶也古語云積德成王積怨成亡荀子曰積土成山風雨興焉積水成淵蛟龍生焉積善成德神明自得自后妃至於士庶人之妻其必勉於積善以成內助之美此引古語與荀卿之言以見積善之不可已也如此婦人善德柔順貞靜溫良莊敬樂乎和平無乖戾也存乎寬𢎞無忌嫉也敦乎仁慈無殘害也執禮秉義無縱越也祗率先訓無愆違也不厲人適已不以欲戕物以是而內助焉積而不已福祿萃焉易曰積善之家必有餘慶書曰作善降之百祥此之謂也祗音支愆丘虔切柔順貞靜者柔順利貞以合乎坤靜之德溫和厚也良易直也莊敬誠一之至也婦人善德無過於此矣乖戻違背也𢎞大也秉執也縱放越度也祗敬率遵先訓先代之訓言也愆過違背也厲虐害也適便也欲私欲也戕物殘傷於物也萃聚也言婦人能全是數者之善而行之無所違則積善之福必源源而至矣故引易書之言以終之以見天下之事未有不由積而成家之所積者善則福慶及於子孫善必積而後成惡雖小而可畏丁寧申戒之意切矣遷善章第九人非上智其孰無過過而能知可以為明知而能改可以跂聖小過不改大惡形焉小善能遷大善成焉跂與企同音棄孰誰也跂舉足也言人非上智之資其誰無過乎然能知其過則謂之明知過而能改則可以跂望於聖人然人每吝於改小過小過不改終成大惡茍能知小善之可為而徙過以從善則大善由茲而立矣蓋積小可以成大也夫婦人之過無他惰慢也嫉妬也邪僻也惰慢則驕孝敬衰焉嫉妬則刻災害興焉邪僻則佚節義頽焉是數者皆德之弊而身之殃或有一焉必去之如蟊螣逺之如蜂蠆蜂蠆不逺則螫身蟊螣不去則傷稼已過不改則纍德蟊音矛螣音特蠆柴去聲螫音釋稼音架佚音逸頽徒回切惰慢者無所敬畏也嫉妬者專於忌媢也邪僻者邪侈放僻也驕者矜髙刻者慘核降於天者曰災作於人者曰害佚蕩佚也頽墜也蟊螣害苖蟲也食根曰蟊食葉曰螣蜂蠆皆毒蟲其芒在尾螫毒也禾之秀實曰稼言婦人於是數者之過或有一焉皆足以喪德而敗身必當逺去之毋使纍其德也核音核若夫以惡小而為之無恤則必敗以善小而忽之不為則必覆能行小善大善攸基戒於小惡終無大戾故諺有之曰屋漏遷居路紆改途傳曰人誰無過過而能改善莫大焉恤憂也覆傾覆也居處也紆縈曲也言人以一事之惡為小而為之無所憂恤雖未即至於敗然有敗之道存焉何則今日為一小惡明日又為一小惡積之之久則小者成大烏有不敗人以一事之善為小而不為雖未便至於覆然有覆之理係焉何則今日舍一小善而不為明日又舍一小善而不為則是終無一善焉得不覆故曰能行小善大善攸基戒於小惡終無大戾又引俗語以明人有過則當改猶屋之敝漏則必遷其處路之紆枉則必由其直也春秋晉靈公殺宰夫士會諫之公曰吾知過矣士會曰人誰無過過而能改善莫大焉事見宣公二年崇聖訓章第十自古國家肇基皆有內助之德埀範後世夏商之初塗山有莘皆明教訓之功成周之興文王后妃克廣關雎之化肇音兆範音范肇始也範法也關雎國風周南詩之首篇也禹娶塗山氏長女為妃獨明教訓而致其化焉湯娶有莘氏之女為妃亦明教訓而致其功焉文王娶聖女姒氏為妃則關雎之化行而仁厚之德廣是皆內助而肇興國家者也我太祖髙皇帝受命而興孝慈髙皇后內助之功至隆至盛蓋以明聖之資秉貞仁之德博古今之務艱難之初則同勤開創平治之際則𢎞基風化表壼範於六宫著母儀於天下驗之往哲允莫與京譬之曰月天下仰其髙明譬之滄海江河趨其浩博然史傳所載什裁一二而微言奧義若南金焉銖兩可寶也若榖粟焉一日不可無也貫徹上下包括巨細誠道德之至要而福慶之大本矣壼音閫博普遍也壼範宫中模範也往哲往古明哲之后也允信也京大也趨歸往也浩博廣大也什猶軍法以十人為仆也裁之為言僅也奧深奧也南金荆揚之金也銖兩者十黍為絫十絫為銖二十四銖為兩也貫徹通達也包括包舉而無遺也此序太祖髙皇帝龍興而孝慈髙皇后備如是髙明廣大之德肅成內助而往古賢后誠莫能同其大也嘉謨聖訓精微深奧至貴至重切於日用語其指要則貫徹乎上下語其浩博則包括乎巨細誠為道德之極至而福慶之本源咸由於斯矣絫音纍后遵之則可以配至尊奉宗廟化天下衍慶源諸侯大夫之夫人與士庶人之妻遵之則可以內佐君子長保富貴利安家室而垂慶後人矣詩云太姒嗣徽音則百斯男敬之哉敬之哉徽音暉遵循也配對也至尊者君也奉承也衍延也慶源福慶之本源也佐助也詩大雅思齊之篇太姒文王之妃也嗣續也徽美也百男舉成數而言其多也此言髙皇后大德懿訓后能循而行之則可以配於天子奉承宗廟教化天下以廣延其福慶之源下至於士庶人之妻莫不皆然又引詩言太姒能繼太任美德之音而子孫衆多也重言敬之哉者以明聖訓之不可以忘故致丁寧之意也景賢範章第十一詩書所載賢妃貞女德懿行備師表後世皆可法也夫女無姆教則婉娩何從不親書史則往行奚考稽往行質前言模而則之則德行成焉姆音茂婉音宛娩音晚懿美也備具也姆女師也婉謂言語娩謂容貌司馬溫公云柔順貌從由也奚何也稽考也往行往哲所行之行也質證也前言前代所訓之言也模規模則法也詩首關雎書美釐降觀古昔所稱頌者皆由其德行純美故可以為天下後世法言女子必有姆教然後能成婉娩之德必親書史然後知古人行事之實否則無以成其德以考其業也故必求法於古則己之德行乃可以成焉夫明鏡可以鑒妍媸權衡可以擬輕重尺度可以測長短往轍可以軌新迹希聖者昌踵弊者亡妍音言媸音笞轍音徹妍美也媸醜也權稱錘也衡平也擬凖擬也尺度説見前測度也轍車輪所輾之迹也軌法也希望也踵躡也錘音椎度入聲輾音碾踵音腫躡音聶是故修恭儉莫盛於皇英求貞順莫備於太薑效誠莊莫隆於太任行孝敬莫純於太姒儀式刑之齊之則聖下之則賢否亦不失於從善皇英堯之二女娥皇女英也以天子之女而事舜於畎畝之中謙謙恭儉思盡婦道太薑者太王之妃也貞順率道而靡有過失太任之性端一誠莊惟德之行太姒仁明有德貴而能勤富而能儉已長而敬不弛於師傅已嫁而孝不衰於父母是數妃者聖德全備特各舉其一二言之可以互見非謂有於此而不足於彼也儀式刑皆法也言能取法於此齊之則可以至於聖下之則可以及於賢有所不至亦不失於為善夫珠玉非寶淑聖為寶令德不虧室家是宜詩云髙山仰止景行行止其謂是與淑善聖通明也令亦善也詩小雅車舝之篇仰望也景行大道也言婦人不以珠玉為寶而以淑聖為寶茍令善之德無所虧缺則可以宜其室家矣故引詩以結之以言髙山則可仰景行則可行然則內助於國家者其可以忘景仰前人之法也哉舝音轄事父母章第十二孝敬者事親之本也養非難也敬為難以飲食供奉為孝斯末矣孔子曰孝者人道之至德夫通於神明感於四海孝之致也善事父母之謂孝洞洞屬屬之謂敬言婦人之事親以孝敬為本不以飲食供奉為難也論語曰有酒食先生饌曽是以為孝乎正此意也此引孔子之言事見亢倉子所謂人道之至德無以復加於孝乎通達於神明感動於四海孝之所致也然則孝敬行於一身而感通之大也如此其可忽乎亢音庚昔者虞舜善事其親終身而慕文王善事其親色憂滿容或曰此聖人之孝也非婦人之所宜也是不然孝弟天性也豈有間於男女乎事親者以聖人為至虞氏舜名書稱其克諧以孝又曰祗載見瞽瞍夔夔齊栗孟子曰大孝終身慕父母五十而慕者豫於大舜見之矣文王之為世子朝於王季日三至於寢門外問內豎曰今日安否何如內豎曰安文王乃喜其有不安節內豎以告文王文王色憂行不能正履王季復膳然後亦復初此舉二聖人之孝以為訓或者以為非婦人之所宜蓋孝弟本乎天性故無間於男女事親者必以聖人之道而為極至豎音樹若夫以聲音笑貌為樂者不善事其親者也誠孝愛敬無所違者斯善事其親者也縣衾斂簟節文之末紉針補綴帥事之微必也恪勤朝夕無怠逆於所命祗敬尤嚴於杖屨旨甘必謹於餕餘而况大於此者乎是故不辱其身不違其親斯事親之大者也縣音懸衾音欽簟添去聲紉音銀針與針同綴音拙一音惴帥音率恪康入聲屨音句餕音俊衾被也簟竹席也紉郭璞云以線貫針也綴聨綴也帥與率同循也恪敬也屨履也食餘曰餕禮曰父母在朝夕恆食子婦佐餕既食恆子餕父歿母存冢子御食羣子婦佐餕如初旨甘柔滑孺餕夫聲音笑貌皆可以偽為之而以為足以事其親則未也惟誠孝愛敬之發於心無所背於理者則可謂善事其親矣若夫謹於事為之末節以此而為孝亦未也必也能盡其誠敬無怠逆於父母之命斯可矣雖杖屨與飲食之餕餘尤加敬謹矧有大於此者而可以不敬乎夫身者親之遺體也不辱其身是不辱其親也豈非事親之大者乎夫自幼而笄既笄而有室家之望焉推事父母之道於舅姑無以復加損矣故仁人之事親也不以既貴而移其孝不以既富而改其心故曰事親如事天又曰孝莫大於寧親可不敬乎詩云害浣害否歸寧父母此后妃之謂也笄音雞害音曷浣音浣笄簮也女子十年姆教十五而笄既笄則許嫁而有室家之責推事父母之道以事舅姑同一道矣惟仁人之事其親終始如一不以富貴而有所改移也家語云事親如事天天者至尊無對惟親可擬揚子曰孝莫大於寧親寧者安其親之心也心有所不安是貽其親之憂也其可忽乎詩周南葛覃之篇害何也浣濯其衣也寧安也言何者當浣而何者可以未浣乎我將服之以歸寧於父母矣此文王后妃既富貴而孝不衰於父母也如此故以是終焉簮緇岑切貽音怡事君章第十三婦人之事君比昵左右難制而易惑難抑而易驕然則有道乎曰有忠誠以為本禮義以為防勤儉以率下慈和以處衆誦詩讀書不忘規諫寢興夙夜惟職愛君昵尼入聲比密也昵日相近也正君曰規分别善惡以陳於君曰諫寢息也興起夙早也職主也言婦人日切近於君之左右難禁制而易眩惑難遏抑而易驕縱婦人事君之道以忠誠而為根本以禮義而為隄防躬行勤儉以表率於下慈仁溫和以安處於衆詩以理性情書以道政事誦詩書之言不違規諌寢興夙夜之間惟主於愛君而已不可頃刻而忘乎正也居處有常服食有節言語有章戒謹讒慝中饋是專外事不涉謹辨內外教令不出逺離邪僻威儀是力毋擅寵而怙恩毋干政而撓法擅寵則驕怙恩則妬干政則乖撓法則亂諺云汨水淖泥破家妬妻擅音膳淖音閙不為宴遊逸樂則居處有常矣不窮嗜欲華靡則服食有節矣不道非禮之言則言語有章矣讒譛也慝邪也饋食也婦人居中而主饋者也故云中饋易曰無攸遂在中饋貞吉詩曰無非無儀惟酒食是議外事不涉者言不與外事也男不言內女不言外是也謹辨內外者禮始於謹夫婦為宫室辨外內男子居外女子居內深宫固門閽寺守之男不入女不出教令不出者言教令不出於閨門也逺離邪僻者不犯於非禮也威儀者德之見乎外者也力用力以修其威儀也擅專也寵愛也怙恃也干預也撓擾也乖戾也汨濁也淖亦泥也言水之濁也淖泥汨之家之破也妬妻敗之夫婦人之事君能謹守禮法遵是數者而行之則未有不善也夫不驕不妬身之福也詩云樂只君子福履綏之夫安命守分僣黷不生詩云夙夜在公實命不同是故薑后脫珥載籍攸賢班姬辭輦古今稱譽綏音雖僣子念切黷音讀珥音耳輦連上聲詩周南樛木之篇履祿也綏安也此詩美后妃無嫉妬之心故樂其德而願其安享福祿也命者天所賦之分也僣侵也黷瀆慢也言安其命而守其分則侵慢之事不生矣詩召南小星之篇此詩南國夫人承后妃之化能不妬忌以惠其下故其衆妾美之如此蓋衆妾進御於君不敢當夕遂言其所以如此者由其所賦之分不同於貴者深以得御於君為夫人之惠無敢致怨於往來之勤也此兩引詩以言事君者無嫉妬之行則必獲福祿安其命分則必無怨惡薑后周宣王之后薑氏珥耳璫也宣王常晏起后脫簮珥待罪永巷使傅母言於王曰妾不才使君王失禮晏朝以見君王樂色而忘德也夫茍樂色必好奢窮欲亂之所興也原亂之興從婢子始敢請婢子之罪王曰寡人不德實自生過非夫人之罪也遂勤於政事卒成中興之業君子謂薑后為能事君也班姬者漢孝成皇帝之婕妤也成帝逰後庭常欲與同輦辭曰觀古圖畫賢聖之君皆有名臣在側三代末主乃有女嬖今欲同輦得無似之乎帝善其言而止又引薑后班姫之事以為事君之法也樛居尤切我國家隆盛孝慈髙皇后事我太祖髙皇帝輔成鴻業居富貴而不驕職內道而益謹兢兢業業不忘夙夜德蓋前古埀訓萬世化行天下詩云思齊太任文王之母思媚周薑京室之婦此之謂也媚明祕切詩大雅思齊之篇思語辭齊莊媚愛也此序孝慈髙皇后之盡道以事太祖髙皇帝亘萬古而莫並是以埀法於天下萬世而無窮復引詩以咏歎之其旨深矣亘居鄧切縱觀往古國家興廢未有不由於婦之賢否也事君者不可不愼詩云夙夜匪解以事一人詩大雅蒸民之篇解怠也一人謂君也歷觀古昔成敗其原皆本於婦人夏之興也以塗山而其亡也以妹喜殷之興也以有娀而其滅也以妲己周之興也以太任太姒而其衰也以褒姒以此而言事君者不可不愼故引詩以結之丁寧告戒之意切矣妹音末妲音怛茍不能胥匡以道則必自荒厥德若網之無綱衆目難舉上無所毗下無所法則淪胥之漸矣夫木瘁者內蠧攻之政荒者內嬖蠱之女寵之戒甚於防敵詩云赫赫宗周褒姒滅之可不鑒哉毗音琵瘁音萃蠧都故切嬖音臂滅呼決切胥相匡正也荒荒迷也毗輔淪陷也沒也瘁病也蠧木中蟲也攻伐也嬖便嬖左右近習者也蠱腹中蠱亦曰惑也詩小雅正月之篇宗周鎬京也褒姒幽王之嬖妾褒國女姒姓也滅亦滅也言婦人之事君茍不能相正以道必自荒迷其德猶網無綱則衆目不舉是以在上者無以為之輔在下者無所以取法是則漸至於淪沒矣夫木之凋瘁者蠧以攻其內政事之荒失者嬖以惑其中故曰女寵之戒甚於防敵蓋拒之欲堅而守之欲固也又引詩以見赫赫然之宗周而一褒姒足以滅之蓋深以為鑒矣鎬音昊夫上下之分尊卑之等也夫婦之道隂陽之義也諸侯大夫及士庶人之妻能推是道以事其君子則家道鮮有不盛矣在上者尊君之謂也在下者卑妾婦之謂也上下有一定之分尊卑有不易之等不敢有一毫之陵越也夫易始乾坤則男女之道著故曰夫婦之道隂陽之義也婦人之事君者能盡其道則國家之隆盛不言可知若夫諸侯大夫及士庶人之妻能推是道以事其君子則家道有不盛者未之有也事舅姑章第十四婦人既嫁致孝於舅姑舅姑者親同於父母尊擬於天地善事者在致敬致敬則嚴在致愛致愛則順專心竭誠毋敢有怠此孝之大節也衣服飲食其次矣擬擬同在家則孝於父母既嫁則孝於舅姑舅姑之親同於父母也舅姑之尊比於天地也孝之之道在於善事之而已善事者在於致敬而已敬則嚴嚴則不茍在於致愛而已愛則順順則不逆專一其心竭盡其誠禁止其怠慢此孝之大目也若夫以衣服飲食奉養為孝抑又其次矣故極甘旨之奉而毫髮有不盡焉猶未嘗養也盡勞勩之力而頃刻有不恭焉猶未嘗事也舅姑所愛婦亦愛之舅姑所敬婦亦欲之樂其心順其志有所行不敢專有所命不敢緩此孝事舅姑之要也勩音異旨美也勩勞也言極其甘美之奉而毫髮之事有不盡於心則與未養同竭其勤勞之力而頃刻之際有所不敬則與未事同故舅姑之所敬愛者亦當敬愛之娛樂其心毋使憂愠也順從其志毋有逆違也已有所行則必稟命於舅姑毋敢自擅也舅姑有命則必奉承而行毋敢稽緩也此孝事舅姑之要道昔太姒思媚周基益隆長孫盡孝唐祚以固甚哉孝事舅姑之大也夫不得於舅姑則不可以事君子而况於動天地通神明集嘉禎乎故自后妃下至卿大夫及士庶人之妻一是皆以孝事舅姑為重詩云夙興夜寐無忝爾所生祚存故切太姒思媚説見前唐太宗文德皇后長孫氏有賢行事髙祖盡孝謹承諸妃消釋嫌猜太宗有天下致基祚之隆后與有力甚矣孝事舅姑其道之大也如此茍惟不得於舅姑是犯七去之一則不足以事其君子况於動天地通神明集禎祥者乎故自后妃以至庶人之妻一切皆以孝事舅姑為重也詩小雅小宛之篇忝辱也引此詩而言事舅姑者當夙興夜寐以盡其道以求無辱於父母而已嫌賢兼切猜倉才切奉祭祀章第十五人道重夫昏禮者以其承先祖共祭祀而已故父醮子命之曰往迎爾相承我宗事母送女命之曰往之女家必敬必戒國君取夫人辭曰共有敝邑事宗廟社稷分雖不同求助一也醮焦去聲醮冠取之祭名也相助也宗事者宗廟之事也女家婦人內夫家故曰女家也言婦人之職奉宗廟祭祀以助其君子上下之分雖有不同其求助於內則一也蓋夫婦親祭所以備外內之官若夫后妃奉神靈之統為邦家之基蠲潔蒸嘗以佐其事必本之以仁孝將之以誠敬躬蠶桑以為玄紞備儀物以共豆籩夙夜在公不以為勞詩云君婦莫莫為豆孔庶蠲音涓紞都感切蠲言齊戒滌濯之潔宗廟之祭春曰祠夏曰禴秋曰嘗冬曰蒸躬以身親之也蠶所以為絲而桑所以養蠶紞織絲為之用縣瑱以塞耳者魯語云王后親織玄紞儀物禮儀之物也共具也木曰豆竹曰籩所以盛菹醢者也詩小雅楚茨之篇君婦主婦也莫莫清靜而敬至也豆所以盛內羞庶羞主婦薦之也庶多也滌音狄濯音濁禴音藥瑱音鎮夫相禮罔愆威儀孔時宗廟饗之子孫順之故曰祭者教之本也茍不盡道而忘孝敬神斯弗享矣神弗享而能保躬裕後者未之有也凡內助於君子者其尚勗之言助於祭祀禮罔愆違而威儀既得其宜宗廟饗其誠而子孫順其孝祭統曰祭者教之本也言聖人立教其本在此茍不盡其誠敬之道則神且弗享其祀矣神之弗享而能保其躬以饒裕其後者未之有也凡有內助之責者可不知勉於是哉母儀章第十六孔子曰女子者順男子之教而長其理者也是故無專制之義所以為教不出閨門以訓其子者也教誨不倦曰長理義理也言女子但順從男子之教而長其義理亦惟在於從人無專制者也然其所以教不出於閨門之內以訓誨其子女而已無閫外之事也教之者導之以德義養之以廉遜率之以勤儉本之以慈愛臨之以嚴恪以立其身以成其德廉儉也遜讓也嚴毅恪敬也言教其子女者須引導之以德義則不入於邪僻涵養之以廉遜則不至於貪鄙先之以勤儉則不至於奢靡以慈愛存於心以嚴恪臨其上乃可以立其身而成其德者也母儀之要斯為至切矣慈愛不至於姑息嚴恪不至於傷恩傷恩則離姑息則縱而教不行矣詩云載色載笑匪怒伊教姑息茍安也言慈愛者必當愛之以道以姑息而為慈愛則不知所以愛其子矣嚴恪者不至於暴戾使在下者畏而愛之茍惟一之以嚴毅而無優裕之容則必至於傷恩傷恩則其心離姑息則其心縱而教訓有所不行矣詩魯頌泮水之篇色和顔色也引詩而言又在於和其顔色以教之也戾音麗夫教之有道矣而在己者亦不可不愼是故女德有常不踰貞信婦德有常不踰孝敬貞信孝敬而人則之詩云其儀不忒正是四國此之謂也忒音慝言所以教其子者既有其道矣而在我之母儀者亦不可不愼夫女有常德不過貞信而已婦有常德不過孝敬而已此亦互文也言在己者有是貞信孝敬之實則人必取以為法詩曹風鳲鳩篇言其儀度不差忒則足以正四國矣鳲音尸睦親章第十七仁者無不愛也親疏內外有本末焉一家之親近之為兄弟逺之為宗族同乎一源矣仁者之人無所不愛也由親以及疏由內以及外皆致其愛焉夫內親而外疏內本而外末親疏之分等差雖有不同推其和睦之道則一而已兄弟者親之至近者也宗族者親之至逺者也溯其流派則始於一源之所出矣豈可忘其所本而不加愛哉差義宜切推出唯切溯音素派普卦切若夫娣姒姑姊妹親之至近者也宜無所不用其情夫木不榮於幹不能以達支火不灼乎中不能以照外是以施仁必先睦親睦親之務必有內助娣音弟姊音子娣姒妯娌相呼之名姑父之姊妹也夫之姊妹亦曰姑女兄曰姊女弟曰妹情實也言此皆親之至近愛之宜盡其情實也幹木正出者支木旁生者灼光明也言施仁之道必先睦親睦親之道必自近始然其能行是道亦必由於內助之所致也妯音逐娌良士切凡一源之出本無異情間以異姓乃生乖别書曰敦敘九族詩曰宜其家人主乎內者體君子之心重源本之義敦頍辨之德廣行葦之風仁恕寬厚敷洽惠施頍犬蕊切辨音卞洽胡夾切大抵逺之為宗族近之為兄弟本出一源而無所異也惟間以異姓不相和睦乃生乖異爾書皋陶謨敦厚也九族髙祖至玄孫之親厚敘九族則親親恩篤而家齊矣詩周南桃夭之篇家人一家之人也凡主乎內者宜體其君子仁愛之心當益重水源木本之義也頍辨小雅詩之篇此詩宴兄弟親戚之詩其辭曰豈伊異人兄弟匪他又曰兄弟甥舅頍辨貌或曰舉首貌辨皮辨也敦頍辨之德者言效是詩之厚於親戚也行葦大雅詩之篇此宴父兄耆老之詩其辭曰戚戚兄弟莫逺具爾行道也葦蘆葦也廣行葦之風者言廣是詩藹然篤厚之意也有如是之恩則其仁厚寬恕之實見於惠施者敷布而周洽矣陶音遙不忘小善不記小過録小善則大義明略小過則讒慝息讒慝息則親愛全親愛全則恩義備矣疏戚之際藹然和樂由是推之內和而外和一家和而一國和一國和而天下和矣可不重與夫親親之間有小善者不可以忘之録其小善則人心益勸而大義益明有小過者不可以記之略其小過則是非不興而讒慝不作如此則親愛之情全而恩義之意備矣則親疏之間藹然和樂自一家而推之至於一國而天下靡有不和者矣其可不以是為重哉大學傳曰一家仁一國興仁一家讓一國興讓此之謂也慈幼章第十八慈者上之所以撫下也上慈而不懈則下順而益親是故喬木竦而枝不附焉淵水涸而魚不藏焉故甘瓠纍於樛木庶草繁於深澤則子婦順於慈仁理也竦息勇切涸音鶴瓠音護纍倫追切上之撫下者一本於慈愛而已慈愛之心有所不懈則在下者必順承而愈親戴其上矣借使上之待下者鮮慈愛之道譬之喬木上竦而旁枝不相附屬淵水涸竭而巨魚不能容藏夫樛木下埀故有甘美之瓠固結於其上矣深澤寬廣故有衆多之草繁盛於其中矣居上慈仁故子婦自順從於下矣其理固如此也若夫待之不以慈而欲責之以孝則下必不安下不安則心離心離則忮忮則不祥莫大焉為人父母者其慈乎其慈乎忮支義切夫待下而不以慈乃欲責之以盡其孝則在下者有所不安於上矣下之不安則其心已離離則有所忮害忮害則其為不祥莫大於是故曰為人父母者其慈乎其慈乎重言之者深言慈愛之道不可以亡也大學傳以慈為使衆之道內助於國家者其可忽乎然有姑息以為慈溺愛以為德是自敝其下也故慈者非違理之謂也必也盡教訓之道乎亦有不慈者則下豈可以不孝必也勇於順令如伯竒者也然亦有不知其子之惡偏於一己之私茍且溺愛以為慈為德是自敗其子也故慈者非若此悖理之謂必盡教訓之道則必無非禮違法之事矣亦有父母待子以不慈則子豈可以不孝必盡其在己者矣伯竒尹吉甫之子也後母譛而逐之伯竒履霜中野勇於順令如伯竒者言在下者當如伯竒之順令也譛側禁切逮下章第十九君子為宗廟之主奉神靈之統宜蕃衍似續傳序無窮故夫婦之道世祀為大古之哲后賢妃皆推德逮下薦達貞淑不獨任已是以茂衍來裔長流慶澤衍音演裔以制切言古之人君主宰天下重以嗣續為大也然使子孫蕃盛者皆由賢妃哲后能不妬忌有逮下之德薦達貞淑以奉其上不專於一己而已是以後嗣延昌慶澤綿逺矣漢明德皇后薦達左右若恐不及後宫有進見者每加慰納周之太姒有逮下之德故樛木形福履之詠螽斯揚振振之美終能昌大本支綿固宗社三王之隆莫此為盛矣螽音終太姒樛木説見前螽斯蝗屬一生九十九子振振盛貌后妃不妬忌而子孫衆多故衆妾以螽斯之羣處和集而子孫衆多比之言其有是德而宜有是福也事見詩周南螽斯篇本宗子也支庶子也本宗則百世為天子支庶則百世為諸侯使宗社綿延鞏固而夏殷周后妃之盛莫有過於太姒者也鞏音拱故婦人之行貴於寬惠惡於妬忌月星並麗豈掩於末光松蘭同畝不嫌於俱秀此承上文而言婦人以寬惠為德而尤惡於妬忌也夫月與星並麗則其光自不相掩松與蘭同秀則其色自不相妨以見已與衆妾同處亦當若此而無所忌嫉也自后妃以至士庶人之妻誠能貞靜寬和明大孝之端廣至仁之意不專一己之欲不蔽衆下之美務廣君子之澤斯上安下順和氣蒸融善慶源源實肇於此矣言凡內助於君子者誠能有貞靜寬和之德明大孝繼承之本廣至仁逮下之意不專己以蔽下之美務推廣君子之恩澤斯則上安其心下順其義而上下之間藹然和氣薰蒸融液而積善之慶源源而來實始由於此矣待外戚章第二十知幾者見於未萌禁微者謹於抑末自昔之待外戚鮮不由於始縱而終難制也雖曰外戚之過亦係乎后德之賢否爾幾者動之微也萌芽也微者細微之事而末又微之至也謹之者言雖至微之事當抑遏之茍忽而不抑將必至於甚大甚大而欲抑則有所不能矣傳曰禁微者易抑末者難正此意也自古之待外戚多因狎恩恃愛始則縱其所為及其後也驕橫強肆而難以裁制雖云外戚之過亦係乎后妃之賢否爾賢者則能戒飭之而長保其安全不賢者則驕縱之而卒使其喪敗也遏阿葛切飭音勑觀之史籍具有明鑒漢明德皇后修飭內政患外家以驕恣取敗未嘗加以封爵唐長孫皇后慮外家以貴富招禍請無屬以樞柄故能使之保全後漢顯宗明德皇后馬氏伏波將軍援之女也謙肅節儉檢抑外家嘗撰顯宗起居注削去兄防參醫藥事肅宗即位請曰黃門舅旦夕供奉且一年既無褒異又不録勤勞無乃過乎后曰吾不欲令後世聞先帝數親後宫之家故不著也建初元年欲封爵諸舅后不聽明年夏大旱言事者以為不封外戚之故后詔曰凡言事者皆欲媚朕以要福爾先帝防愼舅氏不令在樞機之位吾豈可上負先帝之旨下虧先人之德固不許帝省詔悲歎重以為請后曰吾豈徒欲獲謙讓之名而使帝受不外施之嫌哉髙帝約無軍功非劉氏不侯今馬氏無功於國家豈得與隂郭中興之后等耶吾計之熟矣勿有疑也初大夫人葬起墳微髙后以為言兄廖即時減削外親有謙素義行者輒假以溫言賞以財貨如有纎芥即加譴責車服不軌者便絶屬籍遣歸田里於是內外從化諸家惶恐四年帝封三舅廖防光為列侯並辭就關內侯后聞之曰吾居不求安食不念飽冀乘此道不負先帝所以化導兄弟何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第焉唐太宗文德皇后長孫氏隋右驍衛將軍長孫晟之女兄無忌於帝本布衣交以佐命為元功出入卧內帝將引以輔政后固謂不可乘間曰妾託體紫宫尊貴已極不願私親更據權於朝漢之吕霍可以為誡帝不聽自用無忌為尚書僕射后密諭令牢讓帝不獲已乃聽后喜見顔間他日謂帝曰妾家以恩澤進無德而祿易以取禍無屬樞柄以外戚奉朝請足矣此皆后之賢者故能保全外戚也援音院驍音澆晟音盛射音夜其餘若吕霍楊氏之流僣踰奢靡氣焰熏灼無所顧忌遂至傾覆良由內政偏陂養成禍根非一日矣易曰馴致其道至堅氷也馴音旬漢髙祖吕后有佐定天下之功惠帝即位尊為太后帝崩臨朝稱制大赦天下乃立兄子吕台産祿台子通四人為王封諸吕六人為列侯追尊父吕公為吕宣王兄周吕侯為悼武王太后病困以趙王祿為上將軍居北軍梁王産為相國居南軍戒産祿曰髙帝與大臣約非劉氏王者天下共擊之今王吕氏大臣不平我即崩恐其為變必據兵衛宫愼毋送喪及后崩祿産顓兵政因謀作亂太尉周勃等共誅之悉捕諸吕男女無少長皆斬之霍光女為宣帝后宣帝始立立許妃為皇后光妻顯欲以小女為后私使乳醫淳于衍毒殺許后因勸光納女立為后立三嵗而光薨子禹嗣為博陸侯顯改光時所造塋制而侈大之起三出闕北臨昭靈南出承恩盛飾祠室輦閣通屬永巷幽良人婢妾守之廣治第室作乘輿輦加畫繡絪馮黃金塗韋絮薦輪侍婢以五采絲挽顯遊戲第中而禹山亦並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出多從賔客張圍獵黃山苑中使蒼頭奴上朝謁莫敢譴者而顯及諸女晝夜出入長信宫殿中無期度又奴與御史家奴爭道霍氏奴入御史府欲躢大夫門御史為叩頭謝乃去後殺許后事頗泄顯遂與諸壻昆弟謀反發覺皆誅滅唐玄宗貴妃楊氏蜀州司户玄琰女姿色冠代善歌舞邃音律智算過人動移上意姊三人皆有才貌並封國夫人長韓國次虢國次秦國出入宫掖勢傾天下兄銛鴻臚卿纍授三品上柱國錡侍御史尚太華公主賜甲第連於宫禁釗字國忠亦寖顯與銛皆私第立戟五家甲第僣擬宫掖車馬僕御照耀京邑遞相誇尚每搆一堂費踰千萬見勝於己者即徹而復造土木之工晝夜不息頒賜五家中使不絶每有請託府縣承迎峻如詔勑四方賂遺其門如市開元以來豪貴雄盛無楊氏之比玄宗每幸華清宫五家扈從家各為隊隊各一色五家合隊照映川谷如百花煥發遺鈿墜舄瑟瑟珠翠璨瓓芳馥於路每朝賀待漏靚粧盈巷蠟炬如晝國忠既居宰執勢益恣橫十載正月望夕五宅夜逰與廣平公主爭門楊氏奴揮鞭及公主衣公主墜馬駙馬程昌裔扶公主因及數撾公主泣奏之殺楊氏奴昌裔亦停官貴妃姊妹與范陽節度使安祿山結為兄弟及祿山叛露檄數國忠罪河北盜起以太子監撫軍國事國忠大懼及潼關失守玄宗西幸陳玄禮密啓太子誅國忠父子既死軍不散玄宗遣力士宣問對曰禍本尚在蓋指貴妃也帝不獲已與妃決遂縊死韓國虢國二夫人亦為亂兵所殺國忠妻自剄死子暄等皆誅滅按吕霍楊氏僣禮踰分驕奢侈靡氣焰熏灼可畏如此而罔知忌避以至傾覆其祀皆因內政不平包藏禍根非一日矣易戒履霜堅氷至言始雖甚微不可使長長則至於盛也若是者皆因循而至於堅氷也觀於此足以為鑒矣悼音道顓專同薨呼肱切飾音式馮皮氷切挽音晚躢音闥琰以冉切邃音遂虢古伯切銛音纎錡音竒寖與浸同賂音路扈音户舄音昔馥音伏靚音淨撾職瓜切檄形狄切潼音童縊音翳剄古頂切夫欲保全之者擇師傅以教之隆之以恩而不使撓法優之以祿而不使預政杜私謁之門絶請求之路謹奢侈之戒長謙遜之風則其患自弭弭母婢切優有餘也預干也杜塞也謁請也絶斷也弭息也言欲保全外戚者擇師傅以教之使其由於道義隆之以親親之恩使其不擾於法度優之以爵祿使其不干於政事塞其私謁之門斷其請求之路戒之使毋及於奢侈以長其謙卑退遜之風則其驕恣之弊自然而息矣若夫恃恩姑息非保全之道恃恩則侈心肆焉姑息則禍機蓄焉蓄禍召亂其患無斷盈滿招辱守正獲福愼之哉愼之哉恃恩者外戚也姑息者后宫也彼之恃恩則奢侈恣肆靡所不至我之姑息則養成其患而禍機藴蓄於中蓄禍將必召亂由我之姑息而始不能斷決也盈滿則必至於招辱小則失其身家大則覆宗絶嗣惟守正者不驕不侈循於道義故能全保富貴此則可以獲福矣故重言愼之哉者警戒之義至深切矣讀者當詳味之藴於問切內訓
